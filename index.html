<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз Құттықтау</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf6;
            --accent-beige: #f5ebe0;
            --soft-pink: #f2bac9;
            --main-white: #ffffff;
            --pink-text: #e099ae;
        }

        body {
            background-color: var(--bg-color);
            color: var(--pink-text);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Фондағы декорациялар */
        .bg-decor {
            position: fixed;
            font-size: 2.5rem;
            opacity: 0.15;
            user-select: none;
            z-index: -1;
            animation: float-decor 10s infinite ease-in-out alternate;
        }

        .decor-1 { top: 10%; left: 5%; font-size: 3rem; animation-delay: 0s; }
        .decor-2 { top: 20%; right: 10%; animation-delay: 2s; }
        .decor-3 { bottom: 15%; left: 15%; font-size: 2rem; animation-delay: 4s; }
        .decor-4 { bottom: 10%; right: 5%; animation-delay: 1s; }
        .decor-5 { top: 50%; left: -2%; font-size: 3.5rem; animation-delay: 3s; opacity: 0.1; }
        .decor-6 { top: 5%; right: 50%; font-size: 1.5rem; animation-delay: 5s; }

        @keyframes float-decor {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(20px) rotate(10deg); }
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 50px 25px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(242, 186, 201, 0.25);
            border: 1px solid var(--main-white);
            z-index: 10;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: var(--soft-pink);
            line-height: 1.1;
        }

        .names {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 35px;
            color: var(--pink-text);
            letter-spacing: 1.5px;
            border-bottom: 2px solid var(--accent-beige);
            display: inline-block;
            padding-bottom: 10px;
        }

        .invite-text {
            font-weight: 700;
            font-size: 1.05rem;
            line-height: 1.5;
            margin: 15px 0;
        }

        /* --- 8 ФОТОҒА АРНАЛҒАН КАРУСЕЛЬ --- */
        .carousel-container {
            position: relative;
            height: 220px;
            margin: 60px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .carousel {
            width: 100px;
            height: 130px;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotate-carousel 25s linear infinite;
        }

        .photo-box {
            position: absolute;
            width: 100px;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 8 фотоны шеңбер бойымен 45 градус сайын орналастыру (360 / 8 = 45) */
        .photo-box:nth-child(1) { transform: rotateY(0deg) translateZ(190px); }
        .photo-box:nth-child(2) { transform: rotateY(45deg) translateZ(190px); }
        .photo-box:nth-child(3) { transform: rotateY(90deg) translateZ(190px); }
        .photo-box:nth-child(4) { transform: rotateY(135deg) translateZ(190px); }
        .photo-box:nth-child(5) { transform: rotateY(180deg) translateZ(190px); }
        .photo-box:nth-child(6) { transform: rotateY(225deg) translateZ(190px); }
        .photo-box:nth-child(7) { transform: rotateY(270deg) translateZ(190px); }
        .photo-box:nth-child(8) { transform: rotateY(315deg) translateZ(190px); }

        @keyframes rotate-carousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .info-card {
            background: var(--accent-beige);
            padding: 25px;
            border-radius: 30px;
            margin: 35px 0;
        }

        .info-card p {
            font-size: 1rem;
            font-weight: 900;
            margin: 10px 0;
        }

        .footer-text {
            font-weight: 900;
            font-size: 1.25rem;
            color: var(--soft-pink);
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="bg-decor decor-1">🌸</div>
    <div class="bg-decor decor-2">✨</div>
    <div class="bg-decor decor-3">🌷</div>
    <div class="bg-decor decor-4">🎀</div>
    <div class="bg-decor decor-5">🌺</div>
    <div class="bg-decor decor-6">📍</div>

    <div class="container">
        <h1>Құттықтаймыз</h1>
        <div class="names">Мадина, Айым, Гүлнұр Мұратовна</div>
        
        <p class="invite-text">Көктемнің алғашқы мерекесіне арналған салтанатты жиынға шақырамыз</p>

        <div class="carousel-container">
            <div class="carousel">
                <div class="photo-box"><img src="photo1.jpg" alt="1"></div>
                <div class="photo-box"><img src="photo2.jpg" alt="2"></div>
                <div class="photo-box"><img src="photo3.jpg" alt="3"></div>
                <div class="photo-box"><img src="photo4.jpg" alt="4"></div>
                <div class="photo-box"><img src="photo5.jpg" alt="5"></div>
                <div class="photo-box"><img src="photo6.jpg" alt="6"></div>
                <div class="photo-box"><img src="photo7.jpg" alt="7"></div> <div class="photo-box"><img src="photo8.jpg" alt="8"></div> </div>
        </div>

        <div class="info-card">
            <p>КҮНІ: 05.03.2026</p>
            <p>МЕКЕН-ЖАЙЫ: ЦИОЛКОВСКИЙ 31</p>
            <p>УАҚЫТЫ: 18:30</p>
        </div>

        <p class="footer-text">СІЗДЕРДІ АСЫҒА КҮТЕМІЗ</p>
    </div>

</body>
</html>
