<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8 Наурыз Құттықтау</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdfaf6;
            --accent-beige: #f5ebe0;
            --gold-text: #b07d62;
            --main-white: #ffffff;
            --dark-brown: #4a4238;
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-brown);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            text-align: center;
            padding: 60px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(176, 125, 98, 0.1);
            border: 1px solid var(--main-white);
            z-index: 10;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            font-weight: 900;
            margin-bottom: 5px;
            color: var(--gold-text);
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .names {
            font-size: 1.5rem;
            font-weight: 900;
            margin-bottom: 40px;
            color: var(--dark-brown);
            letter-spacing: 2px;
            border-bottom: 2px solid var(--accent-beige);
            display: inline-block;
            padding-bottom: 10px;
        }

        .invite-text {
            font-weight: 700;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 20px 0;
            color: #6b5b52;
        }

        /* 3D Карусель */
        .carousel-container {
            position: relative;
            height: 220px;
            margin: 60px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        .carousel {
            width: 120px;
            height: 150px;
            position: absolute;
            transform-style: preserve-3d;
            animation: rotate-carousel 25s linear infinite;
        }

        .photo-box {
            position: absolute;
            width: 120px;
            height: 150px;
            border-radius: 10px;
            overflow: hidden;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .photo-box:nth-child(1) { transform: rotateY(0deg) translateZ(180px); }
        .photo-box:nth-child(2) { transform: rotateY(60deg) translateZ(180px); }
        .photo-box:nth-child(3) { transform: rotateY(120deg) translateZ(180px); }
        .photo-box:nth-child(4) { transform: rotateY(180deg) translateZ(180px); }
        .photo-box:nth-child(5) { transform: rotateY(240deg) translateZ(180px); }
        .photo-box:nth-child(6) { transform: rotateY(300deg) translateZ(180px); }

        @keyframes rotate-carousel {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .info-card {
            background: var(--accent-beige);
            padding: 30px;
            border-radius: 30px;
            margin: 40px 0;
        }

        .info-card p {
            font-size: 1.1rem;
            font-weight: 900;
            margin: 12px 0;
            color: var(--dark-brown);
        }

        .footer-text {
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--gold-text);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Құттықтаймыз</h1>
        <div class="names">Мадина, Айым, Гүлнұр Мұратовна</div>
        
        <p class="invite-text">Көктемнің алғашқы мерекесіне арналған салтанатты жиынға шақырамыз</p>

        <div class="carousel-container">
            <div class="carousel">
                <div class="photo-box"><img src="photo1.jpg" ></div>
                <div class="photo-box"><img src="photo2.jpg" ></div>
                <div class="photo-box"><img src="photo3.jpg" ></div>
                <div class="photo-box"><img src="photo4.jpg" ></div>
                <div class="photo-box"><img src="photo5.jpg" ></div>
                <div class="photo-box"><img src="photo6.jpg" ></div>
            </div>
        </div>

        <div class="info-card">
            <p>КҮНІ: 05.03.2026</p>
            <p>МЕКЕН-ЖАЙЫ: ЦИОЛКОВСКИЙ 31</p>
            <p>УАҚЫТЫ: 16:00</p>
        </div>

        <p class="footer-text">СІЗДЕРДІ АСЫҒА КҮТЕМІЗ</p>
    </div>

</body>
</html>
